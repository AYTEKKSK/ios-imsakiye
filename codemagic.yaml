workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest

    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install

      - name: Build iOS
        script: |
          cd src
          xcodebuild build \
          -workspace imsakiye.xcworkspace \
          -scheme imsakiye \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    artifacts:
      - src/build/**/*.ipa

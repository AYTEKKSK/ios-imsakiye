workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest

    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install

      - name: Build IPA
        script: |
          cd src
          xcodebuild -workspace imsakiye.xcworkspace \
          -scheme imsakiye \
          -configuration Release \
          -sdk iphoneos \
          -archivePath build/imsakiye.xcarchive archive

          xcodebuild -exportArchive \
          -archivePath build/imsakiye.xcarchive \
          -exportPath build \
          -allowProvisioningUpdates

    artifacts:
      - src/build/*.ipa

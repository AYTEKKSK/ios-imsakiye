workflows:
  ios-workflow:
    name: iOS Unsigned Build
    environment:
      xcode: latest
    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Build iOS
        script: |
          cd src
          xcodebuild -workspace imsakiye.xcworkspace \
          -scheme imsakiye \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          -derivedDataPath ./Build_Output \
          build
      - name: Create IPA
        script: |
          cd src
          mkdir -p Payload
          # Dosyayı Build_Output klasöründen alıyoruz
          cp -R Build_Output/Build/Products/Release-iphoneos/imsakiye.app Payload
          zip -r imsakiye.ipa Payload
    artifacts:
      - src/*.ipa
